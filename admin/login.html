<!doctype html>
<html class="no-js" lang="zh-TW">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, shrink-to-fit=no, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/images/favicon.png" type="image/x-icon">
    <title>登入 - 大灣藥局</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/icons.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/color_skins.css">
    <link rel="stylesheet" href="/css/login.css">
</head>

<body class="theme-color authentication sidebar-collapse login background-effect">
    <ul class="circles p-0 mb-0">
        <li class="brand-img"><img src="/images/bg/background-effect/004-sale.png" class="w-9 h-9" alt="sale"></li>
        <li class="brand-img"><img src="/images/bg/background-effect/018-price tag.png" class="w-9 h-9" alt="price-tag"></li>
        <li class="brand-img"><img src="/images/bg/background-effect/032-box.png" class="w-9 h-9" alt="box"></li>
        <li class="brand-img"><img src="/images/bg/background-effect/036-close.png" class="w-9 h-9" alt="close"></li>
        <li class="brand-img"><img src="/images/bg/background-effect/043-cash register.png" class="w-9 h-9" alt="cash-register"></li>
        <li class="brand-img"><img src="/images/favicon.png" class="w-9 h-9" alt="favicon"></li>
        <li class="brand-img"><img src="/images/bg/background-effect/046-open.png" class="w-9 h-9" alt="open"></li>
        <li class="brand-img"><img src="/images/bg/background-effect/007-shopping cart.png" class="w-9 h-9" alt="shopping-cart"></li>
    </ul>
    <div class="page-header">
        <div class="container">
            <div class="col-md-12 content-center">
                <div class="card-plain">
                    <div class="header">
                        <div class="logo-container">
                            <div class="logo">
                                <img src="/images/logo.png" alt="logo" loading="lazy">
                            </div>
                        </div>
                    </div>
                    <div id="message-container"></div>
                    <form id="form" class="form" method="POST">
                        <div class="content">
                            <div class="input-group input-lg">
                                <input type="text" class="form-control" name="username" placeholder="帳號" value="" autofocus>
                                <span class="input-group-addon">
                                    <i class="zmdi zmdi-account-circle"></i>
                                </span>
                            </div>
                            <div class="input-group input-lg">
                                <input type="password" class="form-control" name="password" placeholder="密碼">
                                <span class="input-group-addon">
                                    <i class="zmdi zmdi-lock"></i>
                                </span>
                            </div>
                        </div>
                        <div class="footer text-center">
                            <button type="submit" class="btn btn-primary btn-round btn-block" disabled>登入</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <footer class="footer">
            <div class="container">
                <div class="copyright">
                    &copy; 2005 - 2026, 大灣藥局 版權所有 KUMA All Rights Reserved.
                </div>
            </div>
        </footer>
    </div>

    <script src="/js/libscripts.bundle.js"></script>
    <script src="/js/vendorscripts.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/localization/messages_zh_TW.min.js"></script>
    <script src="/js/pages/login.js"></script>
    <script>
        // Override form submission to use AJAX
        $(document).ready(function() {
            $('#form').on('submit', function(e) {
                e.preventDefault();

                const $form = $(this);
                const $button = $form.find('button[type="submit"]');
                const username = $form.find('input[name="username"]').val();
                const password = $form.find('input[name="password"]').val();

                // Disable button and show loading state
                $button.prop('disabled', true).text('登入中...');
                $('#message-container').empty();

                $.ajax({
                    url: 'http://localhost:5000/login',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        username: username,
                        password: password
                    }),
                    success: function(response) {
                        if (response.success) {
                            $('#message-container').html('<div class="alert alert-success">登入成功！正在跳轉...</div>');
                            setTimeout(function() {
                                window.location.href = response.redirect;
                            }, 500);
                        } else {
                            $('#message-container').html('<div class="alert alert-danger">' + response.message + '</div>');
                            $button.prop('disabled', false).text('登入');
                        }
                    },
                    error: function() {
                        $('#message-container').html('<div class="alert alert-danger">登入失敗，請稍後再試</div>');
                        $button.prop('disabled', false).text('登入');
                    }
                });
            });

            // Show logout message if present
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('logout') === 'success') {
                $('#message-container').html('<div class="alert alert-success">登出成功</div>');
            }
        });
    </script>
</body>

</html>
